services:
  postgres:
    image: postgres:18
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlsec2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlsec2_pw}
      POSTGRES_DB: mlsec
    volumes:
      - pgdata:/var/lib/postgresql
      - ./services/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - backend_net

  minio:
    image: minio/minio:latest
    container_name: mlsec-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mlsec2}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-mlsec2_pw}
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - backend_net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-mlsec2}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-mlsec2_pw}
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    networks:
      - backend_net

  redis:
    image: redis:7-alpine
    container_name: mlsec-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend_net

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: mlsec-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mlsec2}:${POSTGRES_PASSWORD:-mlsec2_pw}@postgres:5432/mlsec
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-mlsec2}:${RABBITMQ_PASSWORD:-mlsec2_pw}@rabbitmq:5672//
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-mlsec2}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-mlsec2_pw}
      MINIO_SECURE: "false"
      ADMIN_LOCALHOST_ONLY: "false"
      ADMIN_ALLOWED_HOSTS: ${ADMIN_ALLOWED_HOSTS:-[]}
      ADMIN_TRUSTED_PROXY_HOSTS: ${ADMIN_TRUSTED_PROXY_HOSTS:-["127.0.0.1", "::1", "172.16.0.0/12"]}
      ADMIN_ALLOWED_NETWORKS: ${ADMIN_ALLOWED_NETWORKS:-["172.16.0.0/12"]}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-["https://yourdomain.com"]}
      CORS_ALLOW_ORIGIN_REGEX: ${CORS_ALLOW_ORIGIN_REGEX:-"^https?://(yourdomain\.com|localhost|127\.0\.0\.1)(:\d+)?$"}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    networks:
      - backend_net
    depends_on:
      - postgres
      - rabbitmq
      - redis
      - minio

  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mlsec2}:${POSTGRES_PASSWORD:-mlsec2_pw}@postgres:5432/mlsec
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-mlsec2}:${RABBITMQ_PASSWORD:-mlsec2_pw}@rabbitmq:5672//
      CELERY_DEFAULT_QUEUE: mlsec
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-mlsec2}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-mlsec2_pw}
      MINIO_SECURE: "false"
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      CELERY_CONCURRENCY: "${WORKER_CONCURRENCY:-4}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config.yaml:/app/config.yaml:ro
      - worker_cache:/app/cache
    group_add:
      - "${DOCKER_GID:-999}"
    networks:
      - backend_net
      - defense_net
    depends_on:
      - postgres
      - rabbitmq
      - redis
      - minio

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile.prod
    container_name: mlsec-frontend
    restart: unless-stopped
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL:-}
      API_INTERNAL_URL: http://api:8000
    networks:
      - backend_net
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: mlsec-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./services/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    networks:
      - backend_net
    depends_on:
      - api
      - frontend

  certbot:
    image: certbot/certbot
    container_name: mlsec-certbot
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"

  mlsec-gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: mlsec-gateway
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      - defense_net

networks:
  backend_net:
    name: backend_net
    driver: bridge
  defense_net:
    name: defense_net
    driver: bridge

volumes:
  pgdata:
  rabbitmqdata:
  redisdata:
  miniodata:
  worker_cache:
  certbot-conf:
  certbot-www:
