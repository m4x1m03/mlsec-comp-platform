worker:
  defense_job:
    mem_limit: "1g"
    nano_cpus: 1000000000
    pids_limit: 100
    container_timeout: 30
    max_uncompressed_size_mb: 1024
  evaluation:
    requests_timeout_seconds: 5
  source:
    # Resource limits
    max_zip_size_mb: 512
    max_build_time_seconds: 300
    build_mem_limit: "2g"
    temp_build_dir: "/tmp/mlsec-builds"  # Inside container only - NOT mounted from host
    
    # Security settings for build isolation
    use_buildkit: true                    # Enable Docker BuildKit security features
    network_disabled: true                # Prevent network access during builds
    no_cache: true                        # Prevent cache poisoning
    build_cpu_quota: 100000               # Limit CPU usage to 1 core (prevent resource spamming)
    max_dockerfile_size_kb: 100           # Limit Dockerfile size (negotiable, we can remove this)
    
    # Cleanup settings
    cleanup_built_images: true            # Remove built images after evaluation (GitHub/ZIP sources only)
  minio:
    bucket_name: "mlsec-submissions"
  attack:
    check_similarity: true           # false = skip evaluation, accept all validated attacks
    reject_dissimilar_attacks: true  # only applies when check_similarity=true
                                     #   true  = reject if score < minimum_attack_similarity
                                     #   false = log score but accept regardless
    minimum_attack_similarity: 50    # 0–100 threshold (used when check_similarity=true)
    template_path: "/app/attack-template"
    max_zip_size_mb: 100
    sandbox_backend: "virustotal"    # "virustotal" | "local"


application: 
  login_code: 'ABC'