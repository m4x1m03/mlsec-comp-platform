# Demo overlay — use with:
#   docker-compose -f docker-compose.yaml -f docker-compose.demo.yml up --build
#
# Changes vs. base:
#   - Replaces config.yaml with config.demo.yaml (replay sandbox backend, no VT calls)
#   - Mounts ./artifacts/attack-template  → /app/attack-template (template for seeding)
#   - Mounts ./.dev/test-files/reports    → /app/vt-reports      (saved VT reports for replay)

services:
  worker:
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config.demo.yaml:/app/config.yaml:ro        # replaces base config.yaml
      - ./artifacts/attack-template:/app/attack-template:ro
      - ./.dev/test-files/reports:/app/vt-reports:ro
