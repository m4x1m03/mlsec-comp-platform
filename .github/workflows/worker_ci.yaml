name: Worker CI

on:
  push:
  pull_request:

jobs:
  worker-tests:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://mlsec2:mlsec2_pw@localhost:5433/mlsec_test
      REDIS_URL: redis://localhost:6379/0
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: mlsec2
      MINIO_SECRET_KEY: mlsec2_pw
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start test services via Docker Compose
        run: |
          docker compose up -d postgres-test minio

      - name: Wait for test database readiness
        run: |
          for i in {1..30}; do
            if docker exec test-postgres-db pg_isready -U mlsec2 -d mlsec_test; then
              exit 0
            fi
            sleep 2
          done
          echo "Test database did not become ready in time."
          exit 1

      - name: Wait for MinIO readiness
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:9000/minio/health/live 2>/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "MinIO did not become ready in time."
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Worker dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/worker/requirements.txt
          pip install pytest-cov

      - name: Run Worker pytest suite
        working-directory: services/worker
        run: |
          pytest tests/ -v --tb=short --ignore=tests/manual_api_queue_test.py --cov=. --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Add Worker coverage summary
        if: success()
        working-directory: services/worker
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          path = Path("coverage.xml")
          if not path.exists():
              raise SystemExit("coverage.xml not found")

          root = ET.parse(path).getroot()
          rate = root.get("line-rate")
          if rate is None:
              raise SystemExit("line-rate not found in coverage.xml")

          percent = float(rate) * 100
          summary = f"### Worker Coverage\n\nLine coverage: {percent:.2f}%\n"
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write(summary)
          PY

      - name: Upload Worker coverage artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: worker-coverage
          path: services/worker/coverage.xml

      - name: Stop Docker Compose services
        if: always()
        run: docker compose down -v
