name: Worker CI

on:
  push:
  pull_request:

jobs:
  worker-tests:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:password123@localhost:5433/mlsec_test
      REDIS_URL: redis://localhost:6379/0
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start test services via Docker Compose
        run: |
          docker compose up -d postgres-test minio

      - name: Wait for test database readiness
        run: |
          for i in {1..30}; do
            if docker exec test-postgres-db pg_isready -U postgres -d mlsec_test; then
              exit 0
            fi
            sleep 2
          done
          echo "Test database did not become ready in time."
          exit 1

      - name: Wait for MinIO readiness
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:9000/minio/health/live 2>/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "MinIO did not become ready in time."
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Worker dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/worker/requirements.txt

      - name: Run Worker pytest suite
        working-directory: services/worker
        run: |
          pytest tests/ -v --tb=short --ignore=tests/manual_api_queue_test.py

      - name: Stop Docker Compose services
        if: always()
        run: docker compose down -v
