name: API CI

on:
  push:
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password123@localhost:5433/mlsec_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start test database via Docker Compose
        run: docker compose up -d postgres-test

      - name: Wait for test database readiness
        run: |
          for i in {1..30}; do
            if docker exec test-postgres-db pg_isready -U postgres -d mlsec_test; then
              exit 0
            fi
            sleep 2
          done
          echo "Test database did not become ready in time."
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install API test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/api/requirements-dev.txt
          pip install pytest-cov

      - name: Run API pytest suite
        working-directory: services/api
        run: pytest -v --cov=. --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Add API coverage summary
        if: success()
        working-directory: services/api
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          path = Path("coverage.xml")
          if not path.exists():
              raise SystemExit("coverage.xml not found")

          root = ET.parse(path).getroot()
          rate = root.get("line-rate")
          if rate is None:
              raise SystemExit("line-rate not found in coverage.xml")

          percent = float(rate) * 100
          summary = f"### API Coverage\n\nLine coverage: {percent:.2f}%\n"
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write(summary)
          PY

      - name: Upload API coverage artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: services/api/coverage.xml

      - name: Stop Docker Compose services
        if: always()
        run: docker compose down
