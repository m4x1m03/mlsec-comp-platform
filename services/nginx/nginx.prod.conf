upstream api {
    server api:8000;
}

upstream frontend {
    server frontend:4321;
}

# Route /admin requests based on Accept header:
# - Browser page navigations send Accept: text/html → Astro frontend
# - Fetch API calls send Accept: */* → FastAPI backend
# This mirrors the logic in astro.config.mjs's Vite dev proxy bypass function.
map $http_accept $admin_target {
    ~*text/html  http://frontend;
    default      http://api;
}

# 1. Start the platform with the SSL lines below commented out. 
#    - Optional: If you want to access the UI via HTTP before you have SSL ready,
#      comment out the 'Redirect' block on line 34 and uncomment the 'Temporary HTTP' block on line 39.

# 2. Run Certbot to obtain your initial certificates:
#    docker run -it --rm -p 80:80 -v /etc/letsencrypt:/etc/letsencrypt certbot/certbot certonly --standalone -d yourdomain.com

# 3. Uncomment the 'ssl' parameters and certificate lines below.

# 4. Restart Nginx: make prod-up

server {
    listen 80;
    listen [::]:80;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS (Standard)
    location / {
        return 301 https://$host$request_uri;
    }

    # Temporary HTTP Access (Uncomment to test via http://yourdomain.com before SSL is ready)
    # location / {
    #     proxy_pass         http://frontend;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   X-Real-IP         $remote_addr;
    #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    # }
}

server {
    listen 443; # ssl;
    listen [::]:443; # ssl;
    client_max_body_size 2048M;

    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    location = /health {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /queue/ {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # /admin routing: page navigations (Accept: text/html) go to the Astro
    # frontend; all other requests (API fetch calls, Accept: */*) go to FastAPI.
    # A single prefix block replaces the previous exact-match blocks, which
    # were inadvertently catching API calls like /admin/users?include_disabled=true
    # because nginx exact-match ignores query strings during location matching.
    location /admin {
        proxy_pass         $admin_target;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}